plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'org.jmailen.kotlinter' version '5.0.1'
    id 'io.gitlab.arturbosch.detekt' version '1.23.7'
}

apply from: rootProject.file('gradle/quality.gradle')

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}
def signingValue = { name ->
    findProperty(name) ?: System.getenv(name) ?: localProperties.getProperty(name)
}
def releaseStoreFile = signingValue('WEBNOVEL_RELEASE_STORE_FILE')
def releaseStorePassword = signingValue('WEBNOVEL_RELEASE_STORE_PASSWORD')
def releaseKeyAlias = signingValue('WEBNOVEL_RELEASE_KEY_ALIAS')
def releaseKeyPassword = signingValue('WEBNOVEL_RELEASE_KEY_PASSWORD')
def hasReleaseSigning = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace 'com.vinicius741.webnovelarchiver'
    compileSdk 36

    // Observability (Tier 1, T1): Timber logs are gated on BuildConfig.DEBUG in release, so the
    // BuildConfig feature must be on for the variant to generate the class.
    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId 'com.vinicius741.webnovelarchiver.nativeapp'
        minSdk 26
        targetSdk 36
        versionCode 2
        versionName '1.0.1-native'
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
                enableV1Signing true
                enableV2Signing true
                enableV3Signing true
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix '.debug'
        }
        // Instrumentation launches the real application, so give it a separate data sandbox. This
        // keeps connected tests from reading, clearing, or overwriting the user's emulator library.
        instrumentation {
            initWith debug
            applicationIdSuffix '.instrumentation'
            matchingFallbacks = ['debug']
        }
        release {
            minifyEnabled true
            shrinkResources true
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    testBuildType 'instrumentation'
}

// Tooling recommendations: detekt (maintainability/complexity checks) + kotlinter (format).
// Both start permissive so the existing codebase adopts them without a hard fail.
detekt {
    buildUponDefaultConfig = true
    allRules = false
    config = files("$projectDir/detekt.yml")
    parallel = true
}

// Keep every resolvable application configuration reproducible. Update the committed lock state
// intentionally with `./gradlew :app:dependencies --write-locks` when dependencies change.
dependencyLocking {
    lockAllConfigurations()
}

// Canonical local/CI quality gate: formatting, architecture budgets, tests, analysis, and build.
tasks.register('ci') {
    group = 'verification'
    description = 'Runs the complete local and CI verification gate.'
    dependsOn 'lintKotlin', 'checkKotlinFileSize', 'testDebugUnitTest', 'detekt', 'lintDebug', 'assembleDebug'
}

dependencies {
    implementation 'androidx.core:core-ktx:1.17.0'
    implementation 'androidx.activity:activity-ktx:1.12.0'
    // lifecycle-runtime-ktx provides lifecycleScope used by MainActivity (M3 lifecycle-aware scopes)
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.9.1'
    implementation 'androidx.appcompat:appcompat:1.7.1'
    // Browser-powered in-app navigation; required for secure third-party OAuth flows.
    implementation 'androidx.browser:browser:1.9.0'
    // androidx.media — MediaSessionCompat + MediaStyle + MediaButtonReceiver for the TTS foreground
    // service's lock-screen / system media UI and headset/Bluetooth media-button handling
    // (parity gaps 1 & 2; same artifact/version the legacy tts-media-session module used).
    implementation 'androidx.media:media:1.7.0'
    // RecyclerView — recycles views for the Details chapter list and other long lists (Speed S1).
    implementation 'androidx.recyclerview:recyclerview:1.4.0'
    // ViewPager2 — swipe-between-tabs pager in the Library (closes the legacy RN PagerView parity gap).
    implementation 'androidx.viewpager2:viewpager2:1.1.0'
    // MPAndroidChart — line charts on the per-novel Trends screen (score/Patreon over time). Only
    // published on JitPack (see settings.gradle). v3.1.0 is the final release.
    implementation 'com.github.PhilJay:MPAndroidChart:v3.1.0'
    // Jetpack WindowManager — used by FoldTracker to detect a foldable's hinge/inner display so the
    // responsive layout (size classes, multi-column library, two-pane details) adapts on fold/unfold.
    implementation 'androidx.window:window:1.4.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.2'
    // Timber — structured logging (Observability; Tier 1, T1). Plant a DebugTree in debug builds so
    // every catch block and download/TTS state transition is diagnosable from logcat without forcing
    // exceptions into user-facing toasts.
    implementation 'com.jakewharton.timber:timber:5.0.1'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'org.jsoup:jsoup:1.21.2'
    implementation 'com.google.code.gson:gson:2.13.2'
    // Coil — image loading with memory/disk cache, downsampling, cancellation (Speed S4).
    implementation 'io.coil-kt:coil:2.7.0'
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0'
    testImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-test:1.10.2'
    androidTestImplementation 'androidx.test:core-ktx:1.7.0'
    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test:rules:1.7.0'
    androidTestImplementation 'androidx.test.ext:junit-ktx:1.3.0'
}

tasks.register('copyDebugApkToProjectRoot', Copy) {
    from layout.buildDirectory.file('outputs/apk/debug/app-debug.apk')
    into rootProject.layout.projectDirectory.dir('../apk-output')
    rename { 'WebnovelArchiver-Test-debug.apk' }
}

tasks.register('copyReleaseApkToProjectRoot', Copy) {
    from layout.buildDirectory.file('outputs/apk/release/app-release.apk')
    into rootProject.layout.projectDirectory.dir('../apk-output')
    rename { 'WebnovelArchiver-Native-release.apk' }
    onlyIf { hasReleaseSigning }
}

tasks.register('requireReleaseSigning') {
    doLast {
        if (!hasReleaseSigning) {
            throw new GradleException('Release signing is not configured. Set WEBNOVEL_RELEASE_STORE_FILE, WEBNOVEL_RELEASE_STORE_PASSWORD, WEBNOVEL_RELEASE_KEY_ALIAS, and WEBNOVEL_RELEASE_KEY_PASSWORD.')
        }
    }
}

afterEvaluate {
    tasks.named('assembleDebug') {
        finalizedBy 'copyDebugApkToProjectRoot'
    }
    tasks.named('preReleaseBuild') {
        dependsOn 'requireReleaseSigning'
    }
    tasks.named('assembleRelease') {
        finalizedBy 'copyReleaseApkToProjectRoot'
    }
}
