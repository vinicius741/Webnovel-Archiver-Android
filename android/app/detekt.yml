# Detekt configuration (Tooling recommendations).
#
# The ceiling below is a ratchet: it sits at the current finding count so the build fails on any
# *new* finding without forcing the existing ones to be fixed in one pass. Lower it toward 0 as
# findings are addressed; never raise it without a deliberate decision. (Audit Rec 8.)
build:
  maxIssues: 45  # ratchet baseline — lower as existing findings are fixed; do not raise

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 200
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
  ComplexCondition:
    active: true
    threshold: 6
  CyclomaticComplexMethod:
    active: true
    threshold: 25

style:
  active: true
  MaxLineLength:
    active: false  # programmatic UI + long URL patterns make this noisy; deferred
  WildcardImport:
    active: false  # the ui package uses wildcard imports intentionally
  ReturnCount:
    active: false
  MagicNumber:
    active: false  # heavy in programmatic UI layout code
  LoopWithTooManyJumpStatements:
    active: false

potential-bugs:
  active: true
  UnsafeCallOnNullableType:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true

empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: false  # many intentional no-op overrides (WebViewClient, listeners)

exceptions:
  active: true
  # E4: TooGenericExceptionCaught is re-enabled (it is the rule that would have caught the
  # CancellationException-swallowing bugs in E1/E2/E3). The legitimate broad-catch sites — the
  # restore error classifier and the user-facing operation handlers that funnel any failure into a
  # toast/callback after re-throwing CancellationException — opt in explicitly with a per-site
  # @Suppress("TooGenericExceptionCaught") rather than disabling the rule project-wide.
  TooGenericExceptionCaught:
    active: true

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
