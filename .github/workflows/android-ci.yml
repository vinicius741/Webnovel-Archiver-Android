name: Android CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Full local gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run canonical Android gate
        working-directory: android
        run: ./gradlew --no-daemon --continue --stacktrace :app:ci

      - name: Upload failure diagnostics and test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-failure-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            android/app/build/reports/
            android/app/build/test-results/
            android/app/build/outputs/logs/
            android/app/build/outputs/apk/debug/
